<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nemotron ASR</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--accent:#2f81f7;--accent-h:#4493f8;--green:#238636;--red:#da3633;--yellow:#d29922}
    body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:1rem;min-height:100vh}
    .container{max-width:680px;margin:0 auto}
    .header{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.2rem}
    .header h1{font-size:1.15rem;font-weight:600;margin:0}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.2s}
    .dot.live{background:var(--green);animation:pulse 1.5s infinite}
    .dot.err{background:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .status{font-size:0.8rem;color:var(--muted);margin-bottom:1rem}

    .level-bar{height:6px;background:var(--card);border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:1rem;transition:opacity 0.3s}
    .level-bar.idle{opacity:0.3}
    .level-fill{height:100%;width:0%;background:var(--green);border-radius:2px;transition:width 0.05s linear,background 0.1s}
    .level-fill.warm{background:var(--yellow)}
    .level-fill.hot{background:var(--red)}

    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.2rem}
    .tab{padding:0.55rem 1rem;border:none;background:none;color:var(--muted);font-size:0.88rem;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
    .tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .panel{display:none}
    .panel.active{display:block}
    .controls{display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap;margin-bottom:1rem}
    .controls label{font-size:0.78rem;color:var(--muted);display:flex;flex-direction:column;gap:0.2rem}
    select,input[type="file"]{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:0.38rem 0.5rem;font-size:0.85rem;font-family:inherit}
    .btn{border:none;border-radius:6px;padding:0.5rem 1.1rem;font-size:0.88rem;cursor:pointer;font-family:inherit;font-weight:500}
    .btn-go{background:var(--green);color:#fff}
    .btn-go:hover{background:#2ea043}
    .btn-stop{background:var(--red);color:#fff}
    .btn-stop:hover{background:#f85149}
    .btn:disabled{opacity:0.4;cursor:default}
    .btn-upload{background:var(--accent);color:#fff}
    .btn-upload:hover{background:var(--accent-h)}
    .file-info{font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem}
    .output{background:#010409;border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem;min-height:100px;white-space:pre-wrap;word-break:break-word;font-size:0.92rem;line-height:1.6}
    .output .partial{color:var(--muted)}
    .output .final{color:var(--text)}
    .output .placeholder{color:var(--muted);font-style:italic}
    .metrics{display:flex;gap:1rem;margin-top:0.6rem;font-size:0.78rem;color:var(--muted)}
    .metrics span{font-family:ui-monospace,monospace}
    .note{font-size:0.75rem;color:var(--muted);margin-top:0.4rem}
    .checkbox-label{font-size:0.82rem;color:var(--text);display:flex;align-items:center;gap:0.35rem;flex-direction:row}
    .checkbox-label input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="dot" id="dot"></div>
    <h1>Nemotron ASR</h1>
  </div>
  <div class="status" id="status">Ready</div>

  <div class="level-bar idle" id="levelBar">
    <div class="level-fill" id="levelFill"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('mic')">Live Mic</button>
    <button class="tab" onclick="switchTab('file')">File Upload</button>
  </div>

  <div id="panel-mic" class="panel active">
    <div class="controls">
      <button class="btn btn-go" id="startBtn" onclick="startMic()">Start</button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopMic()" disabled>Stop</button>
      <label>Language
        <select id="langMic">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="hi">Hindi</option>
          <option value="zh-CN">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ru">Russian</option>
          <option value="pt-BR">Portuguese</option>
        </select>
      </label>
      <label>Chunk
        <select id="chunkMic">
          <option value="80">80ms</option>
          <option value="160">160ms</option>
          <option value="320">320ms</option>
          <option value="560" selected>560ms</option>
          <option value="1120">1120ms</option>
        </select>
      </label>
      <label class="checkbox-label"><input type="checkbox" id="vadMic"> VAD</label>
    </div>
    <div class="output" id="micOut"><span class="placeholder">Click Start and speak...</span></div>
    <div class="metrics" id="micMetrics"></div>
    <div class="note">Mic needs HTTPS or localhost. Use port 3004 (HTTPS) for mic from LAN, or 3003 (HTTP) on localhost.<br>Smaller chunk size (80-160ms) catches short words better. VAD may skip very brief utterances.</div>
  </div>

  <div id="panel-file" class="panel">
    <div class="controls">
      <input type="file" id="fileInput" accept="audio/*">
      <button class="btn btn-upload" id="uploadBtn" onclick="uploadFile()" disabled>Transcribe</button>
      <label>Language
        <select id="langFile">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="hi">Hindi</option>
          <option value="zh-CN">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ru">Russian</option>
          <option value="pt-BR">Portuguese</option>
        </select>
      </label>
      <label>Chunk
        <select id="chunkFile">
          <option value="80">80ms</option>
          <option value="160">160ms</option>
          <option value="320">320ms</option>
          <option value="560" selected>560ms</option>
          <option value="1120">1120ms</option>
        </select>
      </label>
      <label class="checkbox-label"><input type="checkbox" id="vadFile"> VAD</label>
    </div>
    <div class="file-info" id="fileInfo"></div>
    <div class="output" id="fileOut"><span class="placeholder">Choose an audio file...</span></div>
    <div class="metrics" id="fileMetrics"></div>
  </div>
</div>

<script>
const TARGET_RATE = 16000;

// --- Tab switching ---
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (name==='mic')=== (i===0)));
  document.getElementById('panel-mic').classList.toggle('active', name==='mic');
  document.getElementById('panel-file').classList.toggle('active', name==='file');
}

// --- Status helpers ---
const dot = document.getElementById('dot');
const statusEl = document.getElementById('status');
function setStatus(msg, state) {
  statusEl.textContent = msg;
  dot.className = 'dot' + (state ? ' ' + state : '');
}

// --- Audio level bar ---
const levelBar = document.getElementById('levelBar');
const levelFill = document.getElementById('levelFill');
let analyser = null;
let rafId = null;

function startLevelMonitor(ctx, source) {
  analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);
  levelBar.classList.remove('idle');
  updateLevel();
}

function updateLevel() {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  let sum = 0;
  for (let i = 0; i < buf.length; i++) sum += buf[i];
  const avg = sum / buf.length;
  const pct = Math.min(100, (avg / 80) * 100);
  levelFill.style.width = pct + '%';
  levelFill.className = 'level-fill' + (pct > 65 ? ' hot' : pct > 35 ? ' warm' : '');
  rafId = requestAnimationFrame(updateLevel);
}

function stopLevelMonitor() {
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  analyser = null;
  levelBar.classList.add('idle');
  levelFill.style.width = '0%';
  levelFill.className = 'level-fill';
}

// --- AudioWorklet processor (loaded via Blob URL, no deprecation warning) ---
const WORKLET_CODE = `
class PCMProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0];
    if (ch && ch[0]) {
      const copy = new Float32Array(ch[0].length);
      copy.set(ch[0]);
      this.port.postMessage(copy, [copy.buffer]);
    }
    return true;
  }
}
registerProcessor('pcm-processor', PCMProcessor);
`;

// --- Mic streaming ---
let ws = null, audioCtx = null, workletNode = null, micStream = null, nativeRate = 0;
let partialText = '';
let sendBuffer = [];
const SEND_THRESHOLD = 4096;
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const micOut = document.getElementById('micOut');
const micMetrics = document.getElementById('micMetrics');

async function startMic() {
  startBtn.disabled = true; stopBtn.disabled = false;
  setStatus('Requesting microphone...', '');
  partialText = '';
  micOut.innerHTML = '<span class="placeholder">Connecting...</span>';
  micMetrics.innerHTML = '';

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
  } catch (e) {
    setStatus('Mic denied: ' + e.message, 'err');
    startBtn.disabled = false; stopBtn.disabled = true;
    return;
  }

  const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/v1/transcriptions/stream';
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('Connected', '');
    ws.send(JSON.stringify({
      language: document.getElementById('langMic').value,
      chunk_ms: parseInt(document.getElementById('chunkMic').value),
      use_vad: document.getElementById('vadMic').checked
    }));
  };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.event === 'ready') {
      startAudio(msg.sample_rate || TARGET_RATE);
    } else if (msg.event === 'partial') {
      partialText += msg.text;
      micOut.innerHTML = '<span class="partial">' + esc(partialText) + '</span>';
    } else if (msg.event === 'final') {
      micOut.innerHTML = '<span class="final">' + esc(msg.text) + '</span>';
      setStatus('Done', '');
      micMetrics.innerHTML = fmtMetrics(msg);
    } else if (msg.event === 'error') {
      setStatus('Error: ' + msg.message, 'err');
    }
  };
  ws.onerror = () => { setStatus('WebSocket error', 'err'); cleanupMic(); };
  ws.onclose = () => { if (startBtn.disabled) { setStatus('Disconnected', ''); cleanupMic(); } };
}

async function startAudio(serverRate) {
  audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  nativeRate = audioCtx.sampleRate;
  setStatus('Recording @ ' + nativeRate + 'Hz -> ' + serverRate + 'Hz', 'live');

  const source = audioCtx.createMediaStreamSource(micStream);

  // Level monitor
  startLevelMonitor(audioCtx, source);

  // Load AudioWorklet
  const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
  const workletUrl = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(workletUrl);
  URL.revokeObjectURL(workletUrl);

  workletNode = new AudioWorkletNode(audioCtx, 'pcm-processor');
  sendBuffer = [];

  workletNode.port.onmessage = (e) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    sendBuffer.push(e.data);
    const total = sendBuffer.reduce((s, c) => s + c.length, 0);
    if (total >= SEND_THRESHOLD) {
      const merged = new Float32Array(total);
      let offset = 0;
      for (const c of sendBuffer) { merged.set(c, offset); offset += c.length; }
      sendBuffer = [];
      const pcm = downsample(merged, nativeRate, serverRate);
      if (pcm.length > 0) ws.send(pcm.buffer);
    }
  };

  // Connect: source -> worklet -> muted gain -> destination (keeps graph alive, no echo)
  const mute = audioCtx.createGain();
  mute.gain.value = 0;
  source.connect(workletNode);
  workletNode.connect(mute);
  mute.connect(audioCtx.destination);
}

function stopMic() {
  // Flush remaining buffer
  if (ws && ws.readyState === WebSocket.OPEN && sendBuffer.length > 0) {
    const total = sendBuffer.reduce((s, c) => s + c.length, 0);
    const merged = new Float32Array(total);
    let offset = 0;
    for (const c of sendBuffer) { merged.set(c, offset); offset += c.length; }
    sendBuffer = [];
    const serverRate = TARGET_RATE;
    const pcm = downsample(merged, nativeRate, serverRate);
    if (pcm.length > 0) ws.send(pcm.buffer);
    ws.send(JSON.stringify({ event: 'end' }));
  } else if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ event: 'end' }));
  }
  cleanupMic();
}

function cleanupMic() {
  stopLevelMonitor();
  if (workletNode) { workletNode.disconnect(); workletNode = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  startBtn.disabled = false; stopBtn.disabled = true;
}

// Downsample with linear interpolation
function downsample(buf, inRate, outRate) {
  if (inRate === outRate) return new Float32Array(buf);
  const ratio = inRate / outRate;
  const newLen = Math.round(buf.length / ratio);
  const out = new Float32Array(newLen);
  for (let i = 0; i < newLen; i++) {
    const pos = i * ratio;
    const lo = Math.floor(pos);
    const hi = Math.min(lo + 1, buf.length - 1);
    const frac = pos - lo;
    out[i] = buf[lo] * (1 - frac) + buf[hi] * frac;
  }
  return out;
}

// --- File upload ---
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const fileInfo = document.getElementById('fileInfo');
const fileOut = document.getElementById('fileOut');
const fileMetrics = document.getElementById('fileMetrics');

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (f) {
    uploadBtn.disabled = false;
    fileInfo.textContent = f.name + ' (' + (f.size / 1024).toFixed(0) + ' KB)';
  } else {
    uploadBtn.disabled = true;
    fileInfo.textContent = '';
  }
});

async function uploadFile() {
  const f = fileInput.files[0];
  if (!f) return;
  uploadBtn.disabled = true;
  fileOut.innerHTML = '<span class="placeholder">Transcribing...</span>';
  fileMetrics.innerHTML = '';
  setStatus('Uploading ' + f.name + '...', '');

  const fd = new FormData();
  fd.append('file', f);
  fd.append('language', document.getElementById('langFile').value);
  fd.append('chunk_ms', document.getElementById('chunkFile').value);
  if (document.getElementById('vadFile').checked) fd.append('use_vad', 'true');

  try {
    const resp = await fetch('/v1/transcriptions', { method: 'POST', body: fd });
    const data = await resp.json();
    if (resp.ok) {
      fileOut.innerHTML = '<span class="final">' + esc(data.text) + '</span>';
      setStatus('Done', '');
      fileMetrics.innerHTML = fmtMetrics(data);
    } else {
      fileOut.innerHTML = '<span class="placeholder">Error: ' + esc(data.detail || 'Unknown') + '</span>';
      setStatus('Error', 'err');
    }
  } catch (e) {
    fileOut.innerHTML = '<span class="placeholder">Fetch error: ' + esc(e.message) + '</span>';
    setStatus('Error', 'err');
  }
  uploadBtn.disabled = false;
}

// --- Utils ---
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmtMetrics(m) {
  if (!m.duration_seconds) return '';
  const parts = [];
  if (m.duration_seconds) parts.push('duration: ' + m.duration_seconds.toFixed(2) + 's');
  if (m.wall_seconds) parts.push('wall: ' + m.wall_seconds.toFixed(2) + 's');
  if (m.rtf) parts.push('rtf: ' + m.rtf.toFixed(1));
  if (m.chunks_processed) parts.push('chunks: ' + m.chunks_processed);
  return parts.map(p => '<span>' + p + '</span>').join('');
}
</script>
</body>
</html>
